name: Build Desktop App

on:
  workflow_call:
    inputs:
      channel:
        description: "Release channel (stable or canary)"
        required: true
        type: string
      version_suffix:
        description: "Version suffix to append (e.g., -canary). Empty for stable."
        required: false
        type: string
        default: ""
      electron_builder_config:
        description: "Electron builder config file"
        required: false
        type: string
        default: "electron-builder.ts"
      artifact_prefix:
        description: "Prefix for artifact names"
        required: false
        type: string
        default: "desktop"
      artifact_retention_days:
        description: "Number of days to retain artifacts"
        required: false
        type: number
        default: 30

jobs:
  build-linux:
    name: Build - Linux (x64)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-

      - name: Install dependencies
        run: bun install --frozen --ignore-scripts

      - name: Install Linux native build deps
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev

      - name: Install desktop native dependencies
        working-directory: apps/desktop
        run: bun run install:deps

      - name: Set version suffix
        if: inputs.version_suffix != ''
        working-directory: apps/desktop
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION="${CURRENT_VERSION}${{ inputs.version_suffix }}"
          echo "Setting version to: $NEW_VERSION"
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "
          echo "Updated package.json version to $NEW_VERSION"

      - name: Clean dev folder
        working-directory: apps/desktop
        run: bun run clean:dev

      - name: Generate file icons
        working-directory: apps/desktop
        run: bun run generate:icons

      - name: Compile app with electron-vite
        working-directory: apps/desktop
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DOCS_URL: ${{ secrets.NEXT_PUBLIC_DOCS_URL }}
          NEXT_PUBLIC_STREAMS_URL: ${{ secrets.NEXT_PUBLIC_STREAMS_URL }}
          NEXT_PUBLIC_ELECTRIC_URL: ${{ secrets.NEXT_PUBLIC_ELECTRIC_URL }}
          SENTRY_DSN_DESKTOP: ${{ secrets.SENTRY_DSN_DESKTOP }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          RELAY_URL: ${{ secrets.RELAY_URL }}
          SUPERSET_WORKSPACE_NAME: superset
        run: bun run compile:app

      - name: Build Electron app
        working-directory: apps/desktop
        run: bun run package -- --publish never --config ${{ inputs.electron_builder_config }}

      - name: Verify Linux AppImage + update manifest exist
        working-directory: apps/desktop
        run: |
          ls -la release
          test -n "$(ls -1 release/*.AppImage 2>/dev/null)" || {
            echo "::error::No AppImage artifact generated in apps/desktop/release"
            exit 1
          }
          test -n "$(ls -1 release/*-linux.yml 2>/dev/null)" || {
            echo "::error::No Linux auto-update manifest generated in apps/desktop/release"
            exit 1
          }

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact_prefix }}-linux-appimage
          path: apps/desktop/release/*.AppImage
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload Linux auto-update manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact_prefix }}-linux-update-manifest
          path: apps/desktop/release/*-linux.yml
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

  build-windows:
    name: Build - Windows (x64)
    runs-on: windows-latest
    environment: production

    steps:
      - name: Enable Git long paths
        run: git config --system core.longpaths true

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-

      - name: Install dependencies
        run: bun install --frozen --ignore-scripts

      - name: Patch native-keymap binding.gyp for MSVC
        shell: pwsh
        run: |
          # native-keymap@3.3.9 uses a deprecated V8 API in Electron 40 headers,
          # generating C4996 which electron-gyp treats as an error. Patch binding.gyp
          # directly to add /wd4996 so it is part of the project file, not an env var.
          # Bun stores packages under the repo-root node_modules/.bun/, not the app dir.
          $files = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\node_modules" -Recurse -Filter "binding.gyp" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "native-keymap" }
          if ($files.Count -eq 0) {
            Write-Warning "native-keymap binding.gyp not found — skipping patch"
          }
          foreach ($file in $files) {
            $content = Get-Content $file.FullName -Raw
            if ($content -notmatch '/wd4996') {
              $content = $content -replace "'/ZH:SHA_256'", "'/ZH:SHA_256', '/wd4996'"
              Set-Content $file.FullName $content -NoNewline
              Write-Host "Patched: $($file.FullName)"
            }
          }

      - name: Install desktop native dependencies
        working-directory: apps/desktop
        run: bun run install:deps

      - name: Set version suffix
        if: inputs.version_suffix != ''
        working-directory: apps/desktop
        shell: bash
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION="${CURRENT_VERSION}${{ inputs.version_suffix }}"
          echo "Setting version to: $NEW_VERSION"
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "
          echo "Updated package.json version to $NEW_VERSION"

      - name: Clean dev folder
        working-directory: apps/desktop
        run: bun run clean:dev

      - name: Generate file icons
        working-directory: apps/desktop
        run: bun run generate:icons

      - name: Compile app with electron-vite
        working-directory: apps/desktop
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DOCS_URL: ${{ secrets.NEXT_PUBLIC_DOCS_URL }}
          NEXT_PUBLIC_STREAMS_URL: ${{ secrets.NEXT_PUBLIC_STREAMS_URL }}
          NEXT_PUBLIC_ELECTRIC_URL: ${{ secrets.NEXT_PUBLIC_ELECTRIC_URL }}
          SENTRY_DSN_DESKTOP: ${{ secrets.SENTRY_DSN_DESKTOP }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          RELAY_URL: ${{ secrets.RELAY_URL }}
          SUPERSET_WORKSPACE_NAME: superset
        run: bun run compile:app

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
        run: bun run package -- --publish never --config ${{ inputs.electron_builder_config }} --win --x64

      - name: Verify Windows installer and update manifest exist
        working-directory: apps/desktop
        shell: bash
        run: |
          ls -la release
          test -n "$(ls -1 release/*.exe 2>/dev/null)" || {
            echo "::error::No .exe artifact generated in apps/desktop/release"
            exit 1
          }
          test -f release/latest.yml || {
            echo "::error::No Windows auto-update manifest (latest.yml) generated in apps/desktop/release"
            exit 1
          }

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact_prefix }}-windows-x64-nsis
          path: apps/desktop/release/*.exe
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload Windows auto-update manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact_prefix }}-windows-update-manifest
          path: apps/desktop/release/latest.yml
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error
